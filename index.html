<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
<div class="left-section">
<img src="laundry.jpg" alt="">
</div>

    <div class="right-section">
    <form action="" class="Login">

    <h1>Hello Again!</h1>
    <p style="font-weight: bold; color: rgb(87, 173, 207); font-size: xx-large;">Welcome back! We missed you!</p>
    
        Email <br>
        <input type="email" placeholder="Emailid@site.com" required><br>

        Password <br>
        <input type="password" placeholder="password" required><br>

        <p style="text-align: right; margin-top:-25px;">Forgot Password</p>

        <button>Login</button>

        <p style="text-align: center;">Not a member?<span style="color: blue;">Register Now</span></p>
    </form>
</div> 
</div>
</body>
</html>
